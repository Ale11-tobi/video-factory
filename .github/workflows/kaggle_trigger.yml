name: Trigger Kaggle Run

on:
  repository_dispatch:
    types: [trigger_kaggle]

jobs:
  run-kaggle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Prepare files and push to Kaggle
        env:
          KAGGLE_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SCRIPT_TEXT: ${{ github.event.client_payload.text }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os

          token = os.environ["KAGGLE_TOKEN"]
          username = os.environ["KAGGLE_USERNAME"]
          script_text = os.environ.get("SCRIPT_TEXT", "test")
          chat_id = os.environ.get("CHAT_ID", "")
          tg_token = os.environ.get("TELEGRAM_BOT_TOKEN", "")

          # Build the code that Kaggle will run on the GPU
          code = f"""
          import os
          # Write input text
          with open("input_text.txt", "w") as f:
              f.write('''{script_text}''')
          # Write config
          import json
          config = {{"telegram_bot_token": "{tg_token}", "telegram_chat_id": "{chat_id}"}}
          with open("config.json", "w") as f:
              json.dump(config, f)
          # Clone repo and run
          os.system("git clone https://github.com/Ale11-tobi/video-factory.git")
          os.chdir("video-factory")
          os.system("cp ../input_text.txt .")
          os.system("cp ../config.json .")
          os.system("sed -i '/TTS/d' requirements_kaggle.txt")
          os.system("pip install -r requirements_kaggle.txt")
          os.system("python cli_runner.py ../input_text.txt")
          """

          # Push to Kaggle using Bearer token (new KGAT format)
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json"
          }

          body = {
              "slug": f"{username}/video-factory-run",
              "newTitle": "Video Factory Run",
              "text": code,
              "language": "python",
              "kernelType": "script",
              "isPrivate": True,
              "enableGpu": True,
              "enableInternet": True,
              "datasetDataSources": [],
              "competitionDataSources": [],
              "kernelDataSources": [],
              "categoryIds": []
          }

          print("Pushing kernel to Kaggle...")
          resp = requests.post(
              "https://www.kaggle.com/api/v1/kernels/push",
              headers=headers,
              json=body
          )
          print(f"Status: {resp.status_code}")
          print(f"Response: {resp.text}")

          if resp.status_code != 200:
              raise Exception(f"Kaggle push failed with status {resp.status_code}: {resp.text}")

          print("Kernel pushed successfully!")
          PYEOF
