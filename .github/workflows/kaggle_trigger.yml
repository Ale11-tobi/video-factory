name: Trigger Kaggle Run

on:
  repository_dispatch:
    types: [trigger_kaggle]

jobs:
  run-kaggle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Prepare files and push to Kaggle
        env:
          KAGGLE_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SCRIPT_TEXT: ${{ github.event.client_payload.text }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          GITHUB_TOKEN_PAYLOAD: ${{ github.event.client_payload.github_token }}
          GIST_ID_PAYLOAD: ${{ github.event.client_payload.gist_id }}
          VOICE_URL_PAYLOAD: ${{ github.event.client_payload.voice_url }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os

          token = os.environ["KAGGLE_TOKEN"]
          username = os.environ["KAGGLE_USERNAME"]
          script_text = os.environ.get("SCRIPT_TEXT", "test")
          chat_id = os.environ.get("CHAT_ID", "")
          tg_token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          gh_token = os.environ.get("GITHUB_TOKEN_PAYLOAD", "")
          gist_id = os.environ.get("GIST_ID_PAYLOAD", "")
          voice_url = os.environ.get("VOICE_URL_PAYLOAD", "")

          # Build the code that Kaggle will run on the GPU
          code = f"""
          import os
          # Write input text
          with open("input_text.txt", "w") as f:
              f.write('''{script_text}''')
          # Write config
          import json
          config = {{"telegram_bot_token": "{tg_token}", "telegram_chat_id": "{chat_id}", "github_token": "{gh_token}", "gist_id": "{gist_id}", "voice_url": "{voice_url}"}}
          with open("config.json", "w") as f:
              json.dump(config, f)
          # Clone repo and run
          os.system("git clone https://github.com/Ale11-tobi/video-factory.git")
          os.chdir("video-factory")
          os.system("cp ../input_text.txt .")
          os.system("cp ../config.json .")
          import subprocess
          
          # Aggiorna il Gist per avvisare l'utente della compilazione Turbo-Boost
          gist_payload = json.dumps({"files": {"progress.json": {"content": json.dumps({"status": "Compilazione Turbo-Boost in corso (TensorRT & xformers). Richiede ~1-2 min...", "progress": 2, "eta": "Compilazione...", "video_url": ""})}}})
          requests.patch(f"https://api.github.com/gists/{gist_id}", headers={"Authorization": f"token {gh_token}"}, data=gist_payload)
          
          subprocess.run(["pip", "install", "-r", "requirements_kaggle.txt"], check=True)
          
          # Aggiorna il Gist post-compilazione
          gist_payload_done = json.dumps({"files": {"progress.json": {"content": json.dumps({"status": "Turbo-Boost Attivo! Avvio motore AI...", "progress": 5, "eta": "Calcolo in corso...", "video_url": ""})}}})
          requests.patch(f"https://api.github.com/gists/{gist_id}", headers={"Authorization": f"token {gh_token}"}, data=gist_payload_done)
          
          subprocess.run(["python", "cli_runner.py", "../input_text.txt"], check=True)
          """

          # Push to Kaggle using Bearer token (new KGAT format)
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json"
          }

          body = {
              "slug": f"{username}/video-factory-run",
              "newTitle": "Video Factory Run",
              "text": code,
              "language": "python",
              "kernelType": "script",
              "isPrivate": True,
              "enableGpu": True,
              "enableInternet": True,
              "datasetDataSources": [],
              "competitionDataSources": [],
              "kernelDataSources": [],
              "categoryIds": []
          }

          print("Pushing kernel to Kaggle...")
          resp = requests.post(
              "https://www.kaggle.com/api/v1/kernels/push",
              headers=headers,
              json=body
          )
          print(f"Status: {resp.status_code}")
          print(f"Response: {resp.text}")

          if resp.status_code != 200:
              raise Exception(f"Kaggle push failed with status {resp.status_code}: {resp.text}")

          print("Kernel pushed successfully!")
          PYEOF
